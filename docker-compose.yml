services:
  postgres:
    image: postgres:16-alpine
    container_name: diaslocacao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dias_locacao
      POSTGRES_USER: dias_user
      POSTGRES_PASSWORD: dias_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: diaslocacao-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://dias_user:dias_pass@postgres:5432/dias_locacao?schema=public
      JWT_SECRET: changeme_local
      JWT_EXPIRES_IN: 15m
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: diaslocacao-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules

volumes:
  postgres_data:
